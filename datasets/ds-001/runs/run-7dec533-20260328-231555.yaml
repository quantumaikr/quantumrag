  query: asyncio에서 태스크 취소를 방지하는 방법은 무엇이며, 어떻게 작동하나요?
  difficulty: hard
  type: reasoning
  answer: 'asyncio에서 태스크 취소를 방지하는 방법은 `asyncio.shield(aw)`를 사용하는 것입니다. 이 함수는 awaitable을
    **취소로부터 보호**합니다. 즉, 바깥쪽에서 취소가 발생해도 `shield()`로 감싼 작업 자체는 취소되지 않도록 합니다. [14][16][25]


    작동 방식은 다음과 같습니다:

    - `asyncio.shield(aw)`는 awaitable을 감싸서, 외부 취소가 내부 작업에 직접 전달되지 않게 합니다. [14]

    - 따라서 취소가 걸리더라도 보호된 작업은 계속 실행될 수 있습니다. [14]

    - asyncio 문서의 요약 표에서도 `shield()`의 목적은 “Protect from cancellation”로 명시되어 있습니다.
    [25]


    참고로, 태스크 자체는 일반적으로 `cancel()`로 취소 요청을 받을 수 있고, 취소되면 `CancelledError`가 발생할 수 있습니다.
    `shield()`는 이런 취소 전달을 막는 용도로 사용됩니다. '
