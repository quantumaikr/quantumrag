    반면 `ChainMap`은 **여러 개의 dict/mapping을 하나의 뷰로 묶어 검색**하게 해 주는 클래스입니다. 조회는 여러 맵을 순서대로
    탐색하고, **쓰기/삭제는 첫 번째 맵에만 적용**됩니다. 즉, 여러 설정/범위를 한 번에 다루는 용도에 적합합니다. [30]


