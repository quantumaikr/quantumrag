  query: asyncio.gather()와 asyncio.TaskGroup의 차이점은 무엇인가요?
  difficulty: hard
  type: comparison
  answer: '`asyncio.gather()`와 `asyncio.TaskGroup`은 둘 다 여러 awaitable/Task를 함께 다루지만,
    문서상 역할이 다릅니다. `gather()`는 awaitable 객체들을 **동시에 실행하고 결과를 모아 리스트로 반환**하는 함수입니다.
    [7][13] 반면 `TaskGroup`은 여러 Task를 **관리하는 비동기 컨텍스트 매니저**입니다. [4][13]


    정리하면:

    - `asyncio.gather(*aws, return_exceptions=False)`: 여러 awaitable을 동시에 실행하고 **집계된
    결과(list)** 를 돌려줍니다. [7][13]

    - `asyncio.TaskGroup`: 여러 Task를 **그룹으로 관리**하는 **async context manager**입니다. [4][13]


    따라서 문서 기준으로는 `gather()`는 “결과 수집”에 초점이 있고, `TaskGroup`은 “작업 그룹 관리”에 초점이 있습니다. [7][4'
