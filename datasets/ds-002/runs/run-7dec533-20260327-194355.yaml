- qid: q012
  query: dataclasses의 InitVar과 ClassVar의 차이점은?
  difficulty: hard
  type: comparison
  answer: '`InitVar`와 `ClassVar`는 dataclasses에서 처리 방식이 다릅니다.


    - **InitVar**는 `__init__()`와 `__post_init__()`에 전달되는 **pseudo-field**이지만, **객체에
    저장되지는 않습니다**. 즉, 초기화용 인자처럼 쓰이고 인스턴스 필드로 남지 않습니다. [2][22]

    - **ClassVar**는 dataclasses가 **필드로 무시**합니다. 따라서 `__init__()`에 포함되지 않고, 클래스 변수로
    취급됩니다. [22]


    정리하면:

    - `InitVar` = 초기화/후처리용 임시 입력값 [2][22]

    - `ClassVar` = dataclass 필드가 아닌 클래스 수준 변수 [22]


    예시 관점에서:

    - `InitVar`는 `__post_init__()`에서 받을 수 있지만 저장되지 않습니다. [2][22]

    - `ClassVar`는 아예 dataclass 필드 목록에서 제외됩니다. [22]


    신뢰도: **STR'
