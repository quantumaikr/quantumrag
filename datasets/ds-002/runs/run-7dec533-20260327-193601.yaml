  query: typing.Protocol과 dataclasses.dataclass의 용도 차이는?
  difficulty: hard
  type: comparison
  answer: '`typing.Protocol`과 `dataclasses.dataclass`는 목적이 다릅니다.


    - `typing` 모듈은 Python의 type hints에 대한 런타임 지원을 제공하며, 타입 힌트는 런타임에서 강제되지 않고 정적 타입
    검사기, IDE, 린터에서 사용됩니다. 또한 `Protocol`은 “Generic Protocol”로 소개되어 있어, 구조적 타입(인터페이스처럼
    동작하는 타입)을 표현하는 용도입니다. [12][3]

    - `dataclasses.dataclass`는 사용자 정의 클래스에 `__init__()`, `__repr__()`, `__eq__()`
    같은 특수 메서드를 자동 생성해 주는 데코레이터입니다. 즉, 주로 데이터 보관용 클래스를 간단히 만들기 위한 도구입니다. [13][11]


    정리하면:

    - `Protocol` = “이 객체가 어떤 메서드/속성을 가져야 하는가”를 타입 관점에서 표현

    - `dataclass` = “필드 중심 클래스의 보일러플레이트를 자동'
