- qid: q012
  query: dataclasses의 InitVar과 ClassVar의 차이점은?
  difficulty: hard
  type: comparison
  answer: '`InitVar`는 `__init__()`와 `__post_init__()`에 전달되는 “초기화 전용” pseudo-field이지만,
    객체에 저장되지는 않습니다. `__post_init__()`는 `__init__()` 이후 호출되며 `InitVar` 값을 매개변수로 받습니다.
    [2][22]


    반면 `ClassVar`로 주석된 필드는 dataclasses에서 무시되며, `__init__()`에 포함되지 않습니다. 즉 클래스 변수로
    취급됩니다. [22]


    요약하면:

    - `InitVar`: 초기화 시에만 전달되고 저장되지 않음 [2][22]

    - `ClassVar`: dataclasses 필드로 취급되지 않아 `__init__()`에 포함되지 않음 [22]'
