  query: typing.Protocol과 dataclasses.dataclass의 용도 차이는?
  difficulty: hard
  type: comparison
  answer: '`typing.Protocol`과 `dataclasses.dataclass`는 목적이 다릅니다.


    - `typing.Protocol`은 **구조적 타입 검사**를 위한 것으로, 어떤 객체가 특정 메서드/속성을 갖는지에 따라 타입 호환성을
    판단하는 데 쓰입니다. `typing` 모듈은 타입 힌트에 대한 런타임 지원을 제공하지만, 타입 힌트는 런타임에서 강제되지 않고 정적 타입
    검사기, IDE, 린터에서 활용됩니다. 또한 `Protocol`은 “기본 프로토콜”로 소개되어 있습니다. [6][3]


    - `dataclasses.dataclass`는 **클래스에 대해 `__init__`, `__repr__`, `__eq__` 같은 특수 메서드를
    자동 생성**해 주는 데 쓰입니다. 즉, 주로 데이터 보관용 클래스를 간편하게 만들기 위한 도구입니다. `frozen`, `slots`, `kw_only`
    같은 옵션도 제공합니다. [7]


    정리하면:

    - `Protocol` = “이 객체가 어떤 인터페이'
