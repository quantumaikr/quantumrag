    - **ClassVar**: `typing.ClassVar`로 주석된 필드는 dataclasses가 **무시**하며, `__init__()`에
    포함되지 않습니다. 클래스 변수로 취급됩니다. [14]


    정리하면:

    - `InitVar` = 초기화용 임시 입력값

    - `ClassVar` = 인스턴스 필드가 아닌 클래스 수준 변수 [12][14]


