  answer: "Naive RAG는 전통적인 방식으로 **인덱싱 → 검색 → 생성** 순서로 동작하지만, 여러 한계가 있습니다. [5][7]\n\
    \n1. **낮은 정밀도(precision)**: 검색된 청크가 질문과 잘 맞지 않아, 관련성이 떨어지는 문서가 포함될 수 있습니다. [5][7]\
    \  \n2. **낮은 재현율(recall)**: 필요한 모든 관련 청크를 충분히 찾아오지 못할 수 있습니다. [5][7]  \n3. **오래된\
    \ 정보 문제**: 검색 결과에 최신성이 반영되지 않아 잠재적으로 outdated information이 포함될 수 있습니다. [5][7]\
    \  \n4. **환각(hallucination) 문제**: 잘못되거나 불완전한 컨텍스트로 인해 모델이 부정확한 내용을 생성할 수 있습니다.\
